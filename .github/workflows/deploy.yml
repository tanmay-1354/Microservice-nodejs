name: Deploy Microservice to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, devops]

    steps:
      # -----------------------------
      # 1. Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Configure AWS credentials (OIDC)
      # -----------------------------
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # 3. Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------
      # 4. Build & Push Docker Image
      # Dockerfile is in repo root
      # -----------------------------
      - name: Build and push Docker image
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPO_NAME: ${{ secrets.ECR_REPO_NAME }}
        run: |
          set -e

          IMAGE_TAG=${GITHUB_SHA}

          echo "Building Docker image..."
          sudo docker build -t ${ECR_REPO_NAME}:${IMAGE_TAG} .

          echo "Tagging Docker image..."
          sudo docker tag ${ECR_REPO_NAME}:${IMAGE_TAG} \
            ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}:${IMAGE_TAG}

          echo "Pushing Docker image to ECR..."
          sudo docker push \
            ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}:${IMAGE_TAG}

      # -----------------------------
      # 5. Force ECS rolling deployment
      # -----------------------------
      - name: Deploy to ECS
        env:
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          echo "Triggering ECS rolling deployment..."
          aws ecs update-service \
            --cluster ${ECS_CLUSTER_NAME} \
            --service ${ECS_SERVICE_NAME} \
            --force-new-deployment
