name: Deploy Microservice to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, devops]

    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: "506115905612"
      ECR_REPO_NAME: devops-sam-microservice
      ECR_REGISTRY: 506115905612.dkr.ecr.ap-south-1.amazonaws.com
      ECR_IMAGE_URI: 506115905612.dkr.ecr.ap-south-1.amazonaws.com/devops-sam-microservice

    steps:
    # -----------------------------
    # 1. Checkout code
    # -----------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -----------------------------
    # 2. Configure AWS credentials (OIDC)
    # -----------------------------
    - name: Configure AWS credentials using OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        aws-region: ap-south-1

    # -----------------------------
    # 3. Login to ECR (EXACT REGISTRY)
    # -----------------------------
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ap-south-1 \
        | sudo docker login \
          --username AWS \
          --password-stdin \
          506115905612.dkr.ecr.ap-south-1.amazonaws.com

    # -----------------------------
    # 4. Build & Push Docker Image
    # -----------------------------
    - name: Build and push Docker image
      run: |
        set -e

        IMAGE_TAG=${GITHUB_SHA}
        FULL_IMAGE_URI=${ECR_IMAGE_URI}:${IMAGE_TAG}

        echo "Building image: $FULL_IMAGE_URI"
        sudo docker build -t $FULL_IMAGE_URI .

        echo "Pushing image to ECR"
        sudo docker push $FULL_IMAGE_URI

    # -----------------------------
    # 5. Force ECS rolling deployment
    # -----------------------------
    - name: Deploy to ECS
      run: |
        aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --service ${{ secrets.ECS_SERVICE_NAME }} \
          --force-new-deployment
